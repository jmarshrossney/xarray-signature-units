repos:

  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.8
    hooks:
      # Update lockfile.
      - id: uv-lock

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.12
    hooks:
      # Run the formatter.
      - id: ruff-format
      # Run the linter.
      - id: ruff-check
        args: [ --fix ]

